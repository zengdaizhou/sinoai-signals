<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  <!-- AI circuit brain -->
  <g transform="translate(200,160)" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left brain hemisphere -->
    <path d="M-60,-30 Q-80,-10 -70,20 Q-60,40 -40,35 Q-30,50 -10,45"/>
    <path d="M-60,-30 Q-55,-55 -35,-50 Q-20,-55 -10,-40"/>
    <path d="M-40,5 L-25,-10 L-15,5 L-5,-15"/>
    <!-- Right brain hemisphere -->
    <path d="M60,-30 Q80,-10 70,20 Q60,40 40,35 Q30,50 10,45"/>
    <path d="M60,-30 Q55,-55 35,-50 Q20,-55 10,-40"/>
    <path d="M40,5 L25,-10 L15,5 L5,-15"/>
    <!-- Center connection -->
    <path d="M-10,0 Q0,10 10,0" stroke-width="3"/>
  </g>
  <!-- Circuit lines -->
  <g stroke="#4cc9f0" stroke-width="2" fill="none" opacity="0.6">
    <path d="M60,130 L80,120 L80,100"/>
    <circle cx="80" cy="95" r="3" fill="#4cc9f0"/>
    <path d="M-60,130 L-80,120 L-80,100"/>
    <circle cx="-80" cy="95" r="3" fill="#4cc9f0"/>
    <path d="M0,175 L0,195 L-20,195"/>
    <circle cx="-25" cy="195" r="3" fill="#4cc9f0"/>
    <path d="M0,195 L20,195"/>
    <circle cx="25" cy="195" r="3" fill="#4cc9f0"/>
  </g>
  <!-- Signal waves -->
  <g stroke="#e94560" stroke-width="2" fill="none" opacity="0.4">
    <path d="M100,80 Q110,70 120,80 Q130,90 140,80"/>
    <path d="M110,65 Q120,55 130,65 Q140,75 150,65"/>
    <path d="M-100,80 Q-110,70 -120,80 Q-130,90 -140,80"/>
    <path d="M-110,65 Q-120,55 -130,65 Q-140,75 -150,65"/>
  </g>
  <!-- Text -->
  <text x="200" y="290" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="3">SINOA</text>
  <text x="200" y="325" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#8888aa" letter-spacing="4">SIGNALS</text>
</svg>
