<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SinoAI Signals — Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 260px; background: #1a1a2e; border-right: 1px solid #2a2a3e; padding: 24px 0; overflow-y: auto; }
  .sidebar h1 { font-size: 18px; padding: 0 20px 20px; border-bottom: 1px solid #2a2a3e; margin-bottom: 16px; color: #fff; }
  .sidebar h1 span { color: #e94560; }
  .sidebar .subtitle { font-size: 12px; color: #666; padding: 0 20px; margin-top: -12px; margin-bottom: 20px; }
  .sidebar .status { display: flex; align-items: center; gap: 8px; padding: 0 20px; margin-bottom: 16px; font-size: 13px; color: #888; }
  .sidebar .status .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; flex-shrink: 0; }
  .sidebar .status .dot.running { background: #f0ad4e; animation: pulse 1.5s infinite; }
  .sidebar .status .dot.idle { background: #4cc9f0; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .sidebar .generate-btn { display: block; margin: 0 20px 20px; padding: 10px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .sidebar .generate-btn:hover { opacity: 0.85; }
  .sidebar .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .nav-list { list-style: none; }
  .nav-list li a { display: block; padding: 8px 20px; color: #888; font-size: 13px; text-decoration: none; transition: all .15s; border-left: 3px solid transparent; }
  .nav-list li a:hover { color: #fff; background: rgba(255,255,255,.05); }
  .nav-list li a.active { color: #fff; border-left-color: #e94560; background: rgba(233,69,96,.1); }
  .main { margin-left: 260px; padding: 32px 48px; max-width: 900px; }
  .main h2 { font-size: 22px; margin-bottom: 4px; color: #fff; }
  .main .date { color: #666; font-size: 14px; margin-bottom: 24px; }
  .content { line-height: 1.7; font-size: 16px; }
  .content h1 { font-size: 26px; text-align: center; margin: 24px 0 4px; color: #fff; }
  .content h2 { font-size: 20px; margin: 28px 0 12px; color: #e94560; border-bottom: 1px solid #2a2a3e; padding-bottom: 6px; }
  .content h3 { font-size: 17px; margin: 20px 0 8px; color: #eee; }
  .content p { margin: 12px 0; }
  .content a { color: #4cc9f0; }
  .content hr { border: none; border-top: 1px solid #2a2a3e; margin: 28px 0; }
  .content ul { padding-left: 24px; margin: 8px 0; }
  .content li { margin: 4px 0; }
  .content strong { color: #fff; }
  .content em { color: #aaa; }
  .empty { text-align: center; padding: 60px 0; color: #666; }
  .empty p { font-size: 16px; margin-bottom: 8px; }
  .empty .sub { font-size: 13px; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; color: #fff; opacity: 0; transition: opacity .3s; z-index: 100; }
  .toast.show { opacity: 1; }
  .toast.success { background: #27ae60; }
  .toast.error { background: #e74c3c; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 50; justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #1a1a2e; padding: 24px; border-radius: 12px; width: 360px; border: 1px solid #2a2a3e; }
  .modal h3 { font-size: 16px; margin-bottom: 16px; color: #fff; }
  .modal input { width: 100%; padding: 10px 12px; background: #0f0f1a; border: 1px solid #2a2a3e; border-radius: 6px; color: #fff; font-size: 14px; outline: none; }
  .modal input:focus { border-color: #e94560; }
  .modal .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .modal .actions button { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
  .modal .actions .cancel { background: #2a2a3e; color: #888; }
  .modal .actions .confirm { background: #e94560; color: #fff; }
  .modal .error-msg { color: #e74c3c; font-size: 13px; margin-top: 8px; display: none; }
  .loading { text-align: center; padding: 60px 0; }
  .spinner { width: 32px; height: 32px; border: 3px solid #2a2a3e; border-top-color: #e94560; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 768px) {
    .sidebar { position: static; width: 100%; height: auto; }
    .main { margin-left: 0; padding: 24px 16px; }
  }
</style>
</head>
<body>
<div class="sidebar">
  <h1>SinoAI <span>Signals</span></h1>
  <div class="subtitle">Dashboard</div>
  <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Loading...</span></div>
  <button class="generate-btn" id="generateBtn" onclick="promptPassword()">+ Generate Now</button>
  <nav><ul class="nav-list" id="navList"></ul></nav>
</div>
<div class="main" id="main">
  <div class="loading" id="loading"><div class="spinner"></div><p>Loading newsletter...</p></div>
  <div id="contentArea" style="display:none">
    <h2 id="newsletterTitle">SinoAI Signals</h2>
    <p class="date" id="newsletterDate"></p>
    <div class="content" id="newsletterContent"></div>
  </div>
  <div class="empty" id="emptyState">
    <p>No newsletters yet</p>
    <p class="sub">Click "Generate Now" to create the first issue</p>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Admin Password</h3>
    <input type="password" id="passwordInput" placeholder="Enter admin key" onkeydown="if(event.key==='Enter')doGenerate()">
    <p class="error-msg" id="passwordError">Wrong password</p>
    <div class="actions">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="confirm" onclick="doGenerate()">Confirm</button>
    </div>
  </div>
</div>
<script>
const API = "";
let adminKey = localStorage.getItem("sinoai_admin_key") || "";

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast " + type + " show";
  setTimeout(() => t.classList.remove("show"), 3000);
}

function promptPassword() {
  document.getElementById("modal").classList.add("show");
  document.getElementById("passwordInput").value = "";
  document.getElementById("passwordError").style.display = "none";
  document.getElementById("passwordInput").focus();
}
function closeModal() { document.getElementById("modal").classList.remove("show"); }

async function doGenerate() {
  const pw = document.getElementById("passwordInput").value;
  document.getElementById("passwordError").style.display = "none";
  const btn = document.getElementById("generateBtn");
  btn.disabled = true; btn.textContent = "Triggering...";
  try {
    const res = await fetch(API + "/api/trigger", {
      method: "POST", headers: { "x-admin-key": pw, "Content-Type": "application/json" },
    });
    if (!res.ok) {
      if (res.status === 401) { document.getElementById("passwordError").style.display = "block"; return; }
      throw new Error((await res.text()).slice(0, 60));
    }
    adminKey = pw; localStorage.setItem("sinoai_admin_key", pw);
    showToast("Workflow triggered! Check back in ~3 min", "success");
    closeModal();
  } catch (e) { showToast("Failed: " + e.message, "error"); }
  finally { btn.disabled = false; btn.textContent = "+ Generate Now"; }
}

function mdToHtml(text) {
  const lines = text.split("\n");
  let html = "", inList = false;
  for (let line of lines) {
    const t = line.trim();
    if (!t) { if (inList) { html += "</ul>\n"; inList = false; } continue; }
    if (t === "---") { if (inList) { html += "</ul>\n"; inList = false; } html += "<hr>\n"; continue; }
    if (t.startsWith("# ") && !t.startsWith("## ")) { html += "<h1>" + esc(t.slice(2)) + "</h1>\n"; continue; }
    if (t.startsWith("## ") && !t.startsWith("### ")) { html += "<h2>" + esc(t.slice(3)) + "</h2>\n"; continue; }
    if (t.startsWith("### ")) { html += "<h3>" + esc(t.slice(4)) + "</h3>\n"; continue; }
    if (t.startsWith("- ") || t.startsWith("* ")) {
      if (!inList) { html += "<ul>\n"; inList = true; }
      html += "  <li>" + inl(t.slice(2)) + "</li>\n"; continue;
    }
    if (inList) { html += "</ul>\n"; inList = false; }
    if (t.startsWith("|")) continue; // skip tables
    html += "<p>" + inl(t) + "</p>\n";
  }
  if (inList) html += "</ul>\n";
  return html;
}
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function inl(s) { return esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>'); }

async function loadNewsletter(date) {
  document.getElementById("loading").style.display = "block";
  document.getElementById("contentArea").style.display = "none";
  document.getElementById("emptyState").style.display = "none";
  try {
    const url = API + "/api/latest" + (date ? "?date=" + date : "");
    const res = await fetch(url);
    if (!res.ok) throw new Error("Not found");
    const data = await res.json();
    if (!data || !data.content) throw new Error("Empty");
    // Update active nav
    document.querySelectorAll(".nav-list a").forEach(a => a.classList.remove("active"));
    const navLink = document.querySelector(`.nav-list a[data-date="${data.date}"]`);
    if (navLink) navLink.classList.add("active");
    // Render
    document.getElementById("newsletterTitle").textContent = "SinoAI Signals";
    document.getElementById("newsletterDate").textContent = data.date;
    document.getElementById("newsletterContent").innerHTML = mdToHtml(data.content);
    document.getElementById("loading").style.display = "none";
    document.getElementById("contentArea").style.display = "block";
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("emptyState").style.display = "block";
  }
}

async function loadList() {
  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  try {
    const res = await fetch(API + "/api/list");
    const data = await res.json();
    const nav = document.getElementById("navList");
    nav.innerHTML = "";
    if (!data.newsletters || data.newsletters.length === 0) {
      nav.innerHTML = '<li style="padding:8px 20px;color:#555;font-size:13px">No newsletters</li>';
      document.getElementById("loading").style.display = "none";
      document.getElementById("emptyState").style.display = "block";
      statusDot.className = "dot idle";
      statusText.textContent = "Waiting for first issue";
      return;
    }
    for (const n of data.newsletters) {
      const a = document.createElement("a");
      a.href = "#"; a.textContent = n.date;
      a.dataset.date = n.date;
      a.onclick = (e) => { e.preventDefault(); loadNewsletter(n.date); };
      const li = document.createElement("li");
      li.appendChild(a);
      nav.appendChild(li);
    }
    statusDot.className = "dot idle";
    statusText.textContent = data.newsletters.length + " issues";

    // Auto-load latest
    const firstNav = nav.querySelector("a");
    if (firstNav) loadNewsletter(data.newsletters[0].date);
  } catch (e) {
    statusDot.className = "dot idle";
    statusText.textContent = "Offline";
    document.getElementById("loading").style.display = "none";
  }
}

loadList();
</script>
</body>
</html>
