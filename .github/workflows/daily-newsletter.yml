name: Daily Newsletter

on:
  schedule:
    # Run at 8:00 AM Beijing time (0:00 UTC) daily
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Generate Newsletter
        id: newsletter
        shell: bash
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set +e
          node index.js > newsletter.md 2> run.log
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "Status: $EXIT_CODE"
          echo "--- STDERR LOG ---"
          cat run.log
          echo "--- END STDERR ---"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Script failed, but uploading logs anyway"
          fi
          set -e

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-output
          path: |
            newsletter.md
            run.log

      - name: Send to Telegram
        if: always() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f newsletter.md ] && [ -s newsletter.md ]; then
            cat newsletter.md | head -c 3500 > /tmp/msg.txt
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=$(cat /tmp/msg.txt)" \
              -d "parse_mode=Markdown" > /dev/null
            echo "Telegram notification sent"
          else
            echo "No newsletter.md found or empty"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=SinoAI Signals: Newsletter generation FAILED. Check GitHub Actions." > /dev/null
          fi
