name: Daily Newsletter

on:
  schedule:
    # Run at 8:00 AM Beijing time (0:00 UTC) daily
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Generate Newsletter
        id: newsletter
        shell: bash
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set +e
          mkdir -p newsletter-output
          node index.js 2> newsletter-output/run.log
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "Status: $EXIT_CODE"
          echo "--- STDERR LOG ---"
          cat newsletter-output/run.log
          echo "--- END STDERR ---"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Script failed, but uploading logs anyway"
          fi
          set -e

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-output
          path: |
            newsletter-output/newsletter.md
            newsletter-output/newsletter.html
            newsletter-output/rss.xml
            newsletter-output/run.log
            newsletter-output/.quality

      - name: Archive to Repository
        if: steps.newsletter.outputs.exit_code == 0
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p archive
          cp newsletter-output/newsletter.md "archive/$DATE.md"
          if [ -f newsletter-output/newsletter.html ]; then cp newsletter-output/newsletter.html "archive/$DATE.html"; fi
          git config user.name "SinoAI Bot"
          git config user.email "bot@sinoaisignals.com"
          git add "archive/$DATE.md" "archive/$DATE.html" 2>/dev/null || git add "archive/$DATE.md"
          git diff --staged --quiet || (git commit -m "Archive newsletter $DATE" && git push)

      - name: Install Chromium for Puppeteer
        if: steps.newsletter.outputs.exit_code == 0
        run: |
          echo "Installing Chromium..."
          sudo apt-get update -qq || true
          sudo apt-get install -y -qq chromium-browser 2>/dev/null || \
            sudo apt-get install -y -qq chromium 2>/dev/null || true
          # Install Chrome/Chromium system deps (names differ by Ubuntu version)
          sudo apt-get install -y -qq \
            ca-certificates fonts-liberation libasound2t64 libasound2 libatk-bridge2.0-0 \
            libatk1.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 \
            libnspr4 libnss3 libu2f-udev libvulkan1 libxcomposite1 \
            libxdamage1 libxkbcommon0 libxrandr2 xdg-utils 2>/dev/null || true
          CHROME=$(which chromium-browser || which chromium || which google-chrome || which google-chrome-stable || echo "")
          if [ -n "$CHROME" ]; then
            echo "PUPPETEER_EXEC_PATH=$CHROME" >> $GITHUB_ENV
            echo "Found browser: $CHROME"
          else
            echo "No browser found, Puppeteer will try auto-detect"
          fi

      - name: Publish to Substack
        id: publish
        if: success() && hashFiles('newsletter-output/.quality') != ''
        env:
          SUBSTACK_SID: ${{ secrets.SUBSTACK_SID }}
          SUBSTACK_EMAIL: ${{ secrets.SUBSTACK_EMAIL }}
          SUBSTACK_PASSWORD: ${{ secrets.SUBSTACK_PASSWORD }}
          SUBSTACK_URL: ${{ secrets.SUBSTACK_URL }}
        run: |
          if [ -z "$SUBSTACK_SID" ] && [ -z "$SUBSTACK_EMAIL" ]; then
            echo "Substack not configured, skipping publish"
            exit 0
          fi
          mkdir -p .debug
          node publish.js 2>&1 | tee publish.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload Publish Debug
        if: always() && steps.newsletter.outputs.exit_code == 0
        uses: actions/upload-artifact@v4
        with:
          name: publish-debug
          path: |
            publish.log
            .debug/*.png
          if-no-files-found: ignore

      - name: Post to Twitter/X
        if: success()
        env:
          TWITTER_APP_KEY: ${{ secrets.TWITTER_APP_KEY }}
          TWITTER_APP_SECRET: ${{ secrets.TWITTER_APP_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: node tweet.js

      - name: Send to Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured, skipping"
            exit 0
          fi
          if [ -f newsletter-output/newsletter.md ] && [ -s newsletter-output/newsletter.md ]; then
            cat newsletter-output/newsletter.md | head -c 3500 > /tmp/msg.txt
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=$(cat /tmp/msg.txt)" \
              -d "parse_mode=Markdown" > /dev/null
            echo "Telegram notification sent"
          else
            echo "No newsletter-output/newsletter.md found or empty"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=SinoAI Signals: Newsletter generation FAILED. Check GitHub Actions." > /dev/null
          fi
